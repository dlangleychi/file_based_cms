<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>File List</title>
</head>
<body>
  <ul>
    {% for file in files %}
      <li><a href="{{ url_for('file_content', filename=file)}}">{{ file }}</a></li>
    {% endfor %}
  </ul>
</body>
</html>
